<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Mechanical Keyboard Hub - Store your precious collection and show it off as a link</title>
    <meta name="description" content="Mechanical Keyboard Hub is a website that stores peoples mechanical keyboard collection
    and provides a link to share a detailed representation of their collection to their friends. Gone are the days of having to list out your keyboard specs">
    <meta name="keywords" content="mechanical keyboard, collection, social">
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <link href="https://fonts.googleapis.com/css?family=Lato:300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <nav role='navigation'>
            <div id="menu__icon">
                <a href="index.html"><img src="resources/images/keyboard.svg" alt="A picture of a keyboard"></a>
            </div>

            <div id="menu__right">

              <input type="checkbox" />
              
              <span></span>
              <span></span>
              <span></span>
              
              <ul class="menu" id="right">
                <a href="login.html"><li>Login</li></a>
                <a href="register.html"><li>Signup</li></a>
              </ul>
            </div>
          </nav>
    </header>

    <div class="pagetitle">
        <p>Login</p>
    </div>

    <div id="notification">
        
    </div>

    <div class="form__container">
        <form method="post" class="pageform" id="form__login">
            <label for="username">Username</label>
            <input type="text" placeholder="Enter your username" id="login__username" name="username">

            <label for="password">Password</label>
            <input type="password" placeholder="Enter your password" id="login__password" name="password">
            
            <div id="form__save">
                <button type="button" class="form__btn" id="loginbtn">Submit</button>
            </div>

            <div id="form__signup">
                <button type="button" class="form__link" id="signuplink">No Account? Sign up here!</button>
            </div>

            <div id="form__forget">
                <button type="button" class="form__link" id="forgetpasswordlink">Forgot your password?</button>
            </div>
        </form>
    </div>



    <script async src="js/login.js"></script>
    <script defer src="js/login.js"></script>
</body>

</html>
