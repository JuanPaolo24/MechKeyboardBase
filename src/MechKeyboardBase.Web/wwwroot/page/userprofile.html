<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Mechanical Keyboard Hub - Store your precious collection and show it off as a link</title>
    <meta name="description" content="Mechanical Keyboard Hub is a website that stores peoples mechanical keyboard collection
    and provides a link to share a detailed representation of their collection to their friends. Gone are the days of having to list out your keyboard specs">
    <meta name="keywords" content="mechanical keyboard, collection, social">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Lato:300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header>
            <ul class="menu">
                <li class="menu__left">
                    <a href="userauthenticated.html">Mechanical Keyboard Hub</a>
                </li>
                <li class="menu__right">
                    <a href="account.html">Account</a>
                    <a href="userprofile.html">Your Collection</a>
                    <button id="login">Logout</button>
                </li>
            </ul>
    </header>

    <div id="modal__container">
            <span id="modal"></span>
        </div>


    <div class="form__addkeyboard" id="addkeyboard-form">
            <form class="form__container">
                <div class="container__closebtn">
                    <button type="button" class="form__close" id="closeaddkeyboardform">x</button>
                </div>
            
                <h1 id="form__title">Add a new keyboard</h1>
    
                <label for="keyboardname"><b>Keyboard Name</b></label>
                <input type="text" placeholder="Enter Keyboard Name" name="keyboardname" required>
    
                <label for="keyboardcase"><b>Keyboard Case</b></label>
                <input type="text" placeholder="Enter Keyboard Case" name="keyboardcase" required>

                <label for="pcb"><b>PCB</b></label>
                <input type="text" placeholder="Enter PCB" name="pcb" required>

                <label for="plate"><b>Plate</b></label>
                <input type="text" placeholder="Enter Plate Type" name="plate" required>

                <label for="keycaps"><b>Keycaps</b></label>
                <input type="text" placeholder="Enter Keycaps" name="keycaps" required>

                <label for="switch"><b>Switch</b></label>
                <input type="text" placeholder="Enter Switch" name="switch" required>
                
                <div id="form__savekeyboard">
                    <button type="submit" class="btn" id="savekeyboardbtn">Save to Collection</button>
                </div>
            </form>
    
        </div>


    <div class="row1">
        <div id="row1__title">
            <p>Welcome to your Collection Xenous!</p>
        </div>
        <div class="row1__function">
            <input id="searchbar" type="text" placeholder="Search by name">
            <button type="button" class="btn" id="addbtn">+</button>
        </div>
    </div>


    <div class="row2">
        <div id="row2__leftkeyboard">
            <div id="row2__leftimage">
                <img src="../images/FirstImage.jpg" width="500" height="300" class="rounded-corners">
            </div>
            <div id="row2__img">
                    <p>Keyboard Name: Polar</p>
                    <p>Case: KBD75</p>
                    <p>PCB: KBD75</p>
                    <p>Plate Type: Brass</p>
                    <p>Keycaps: GMK Polar</p>
                    <p>Switch: Gateron Black Ink</p>
                    <p>User: Xenous</p>
                </div>
        </div>
        <div id="row2__rightkeyboard">
            <img src="../images/SecondImage.jpg" width="500" height="300" class="rounded-corners">
        </div>
    </div>

    <div class="row3">
        <div id="row3__leftkeyboard">
            <img src="../images/ThirdImage.jpg" width="500" height="300" class="rounded-corners">
        </div>
        <div id="row3__rightkeyboard">
            <img src="../images/FourthImage.jpg" width="500" height="300" class="rounded-corners">
        </div>
    </div>
    <script async src="../js/userprofile.js"></script>
    <script defer src="../js/userprofile.js"></script>
</body>

</html>
